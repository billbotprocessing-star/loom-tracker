<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0c29">
<title>Budget Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0f0c29}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:white;display:flex;flex-direction:column}
:root{--indigo:#6366f1;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--pink:#f43f5e;--blue:#3b82f6;--gray:#6b7280;--safe-bottom:env(safe-area-inset-bottom,0px)}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none}
button{cursor:pointer;border:none;background:none}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto;width:100%;background:linear-gradient(160deg,#0f0c29 0%,#1a1040 50%,#16213e 100%);position:relative}
.topbar{flex-shrink:0;padding:12px 16px 10px;background:rgba(255,255,255,0.03);border-bottom:0.5px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;padding-top:max(12px,env(safe-area-inset-top,12px))}
.topbar-left .title{font-size:16px;font-weight:600;letter-spacing:-.2px}
.topbar-left .sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.hbtn{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:500;border:0.5px solid}
.hbtn-ghost{border-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.04)}
.hbtn-indigo{border-color:rgba(99,102,241,0.4);color:#818cf8;background:rgba(99,102,241,0.12)}

.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px 14px 16px}

/* ── BOTTOM NAV ── */
.bottom-nav{flex-shrink:0;display:flex;background:rgba(15,12,41,0.95);border-top:0.5px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-bottom:max(8px,var(--safe-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;gap:3px;color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:.3px;transition:color .15s}
.nav-item.active{color:#818cf8}
.nav-item .ico{font-size:18px;line-height:1}
.nav-item.active .ico{filter:drop-shadow(0 0 6px rgba(129,140,248,0.6))}

/* ── CARDS ── */
.card{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px}
.card+.card{margin-top:10px}
.sec-lbl{font-size:10px;color:rgba(255,255,255,0.38);margin-bottom:10px;letter-spacing:.3px;text-transform:uppercase}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:rgba(255,255,255,0.05);border-radius:14px;padding:12px;border-top:2px solid var(--bc)}
.stat-card .lbl{font-size:10px;color:rgba(255,255,255,0.38);margin-bottom:4px}
.stat-card .val{font-size:18px;font-weight:600;letter-spacing:-.5px}

/* ── PROGRESS ── */
.prog-bg{height:8px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .8s ease}

/* ── TXN ROWS ── */
.txn-list{display:flex;flex-direction:column;gap:6px}
.txn-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.06)}
.txn-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.txn-info{flex:1;min-width:0}
.txn-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-meta{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}
.txn-actions{display:flex;gap:5px;flex-shrink:0}
.txn-amount{font-size:13px;font-weight:600;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;border:0.5px solid}
.edit-btn{border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5)}
.del-btn{border-color:rgba(239,68,68,0.2);background:rgba(239,68,68,0.07);color:#f87171}
.rec-badge{font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(139,92,246,0.2);color:#a78bfa;display:inline-block}

/* ── SAV ROWS ── */
.sav-row{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.07);border-radius:16px;padding:14px;margin-bottom:8px}

/* ── FORMS ── */
.inp{width:100%;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 13px;color:white;font-size:14px}
.inp:focus{border-color:rgba(99,102,241,0.5);outline:none}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:5px;letter-spacing:.2px}
select.inp option{background:#1a1040;color:white}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:13px;border-radius:12px;background:var(--indigo);color:white;font-size:14px;font-weight:600;border:none}
.btn-cancel{padding:13px 20px;border-radius:12px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);font-size:14px;border:none}
.btn-danger{width:100%;padding:13px;border-radius:12px;background:var(--red);color:white;font-size:14px;font-weight:600;border:none}
.btn-green{width:100%;padding:13px;border-radius:12px;background:var(--green);color:white;font-size:14px;font-weight:600;border:none}
.btn-row{display:flex;gap:8px}
.btn-row .btn-primary{flex:1}
.btn-row .btn-cancel{flex-shrink:0}
.fab{position:fixed;bottom:calc(68px + max(12px,var(--safe-bottom)));right:16px;width:52px;height:52px;border-radius:50%;background:var(--indigo);color:white;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(99,102,241,0.5);z-index:50;border:none}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:#1e1458;border-radius:24px 24px 0 0;padding:20px 18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding-bottom:max(20px,var(--safe-bottom))}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}

/* ── TOGGLE ── */
.tog-track{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog-thumb{width:18px;height:18px;border-radius:50%;background:white;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}

/* ── SCORE RING ── */
.score-wrap{display:flex;align-items:center;gap:8px}
.score-lbl{font-size:11px;font-weight:500}
.score-sub{font-size:10px;margin-top:1px}

/* ── CHAT ── */
.chat-area{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;min-height:260px}
.chat-msg{display:flex}
.chat-msg.user{justify-content:flex-end}
.bubble{max-width:85%;padding:10px 14px;font-size:13px;line-height:1.55;color:rgba(255,255,255,0.9)}
.bubble.assistant{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.09);border-radius:16px 16px 16px 4px}
.bubble.user{background:var(--indigo);border-radius:16px 16px 4px 16px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#818cf8;animation:bounce .9s ease-in-out infinite;display:inline-block}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.chip{font-size:11px;padding:6px 12px;border-radius:20px;border:0.5px solid rgba(99,102,241,0.35);background:rgba(99,102,241,0.1);color:#818cf8;cursor:pointer;white-space:nowrap}
.chips-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips-scroll::-webkit-scrollbar{display:none}
.chat-input-row{display:flex;gap:8px;align-items:center}
.chat-input-row .inp{flex:1;padding:11px 14px}
.send-btn{width:44px;height:44px;border-radius:12px;background:var(--indigo);color:white;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none}

/* ── SEARCH BAR ── */
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row .inp{flex:1;padding:10px 13px}
.filter-select{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 10px;color:white;font-size:12px;max-width:110px}

/* ── UPLOAD ── */
.drop-zone{border:1.5px dashed rgba(99,102,241,0.4);border-radius:18px;padding:36px 16px;text-align:center;cursor:pointer;background:rgba(99,102,241,0.04)}

/* ── DONUT ── */
.donut-wrap{display:flex;flex-direction:column;align-items:center}
.legend{display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,0.5)}
.legend-dot{width:7px;height:7px;border-radius:2px}

/* ── INSIGHT ── */
.insight{background:rgba(16,185,129,0.08);border:0.5px solid rgba(16,185,129,0.2);border-radius:14px;padding:12px 14px}
.insight .ilbl{font-size:10px;font-weight:600;color:#6ee7b7;margin-bottom:3px;letter-spacing:.3px;text-transform:uppercase}
.insight p{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5}

/* ── ICON GRID ── */
.icon-grid{display:flex;flex-wrap:wrap;gap:6px}
.icon-btn{width:38px;height:38px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer}
.icon-btn.sel{border-color:var(--indigo);background:rgba(99,102,241,0.2)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .15s}
.color-dot.sel{border-color:white}

/* ── RESPONSIVE DESKTOP ── */
@media(min-width:540px){
  body{background:#0a0818;align-items:center;justify-content:center}
  .app{height:min(820px,95vh);border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.6);border:0.5px solid rgba(255,255,255,0.08)}
  .fab{bottom:calc(68px + 12px);right:calc(50% - 260px + 16px)}
}
@media(max-width:380px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat-card .val{font-size:15px}
  .topbar-right .hbtn{display:none}
  #menu-btn{display:flex!important}
}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">💰 Budget Tracker</div>
      <div class="sub">April 2024</div>
    </div>
    <div class="topbar-right">
      <button class="hbtn hbtn-ghost" onclick="openEditBudgets()">Budgets</button>
      <button class="hbtn hbtn-indigo" onclick="exportPDF()">Export</button>
      <div id="score-ring"></div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scroll-area">
    <div id="view-dashboard"></div>
    <div id="view-transactions" class="hidden"></div>
    <div id="view-savings" class="hidden"></div>
    <div id="view-coach" class="hidden"></div>
    <div id="view-upload" class="hidden"></div>
  </div>

  <!-- FAB -->
  <button class="fab hidden" id="fab" onclick="onFab()">+</button>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-item active" data-view="dashboard" onclick="switchView('dashboard',this)">
      <span class="ico">◉</span><span>Dashboard</span>
    </button>
    <button class="nav-item" data-view="transactions" onclick="switchView('transactions',this)">
      <span class="ico">≡</span><span>Transactions</span>
    </button>
    <button class="nav-item" data-view="savings" onclick="switchView('savings',this)">
      <span class="ico">◎</span><span>Savings</span>
    </button>
    <button class="nav-item" data-view="coach" onclick="switchView('coach',this)">
      <span class="ico">✦</span><span>AI Coach</span>
    </button>
    <button class="nav-item" data-view="upload" onclick="switchView('upload',this)">
      <span class="ico">↑</span><span>Upload</span>
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg hidden" id="modal-bg" onclick="bgClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const CATS=["Food & Dining","Transport","Entertainment","Shopping","Utilities","Health","Subscriptions","Other"];
const COLORS={"Food & Dining":"#6366f1","Transport":"#10b981","Entertainment":"#f43f5e","Shopping":"#f59e0b","Utilities":"#3b82f6","Health":"#ef4444","Subscriptions":"#8b5cf6","Other":"#6b7280"};
const ICONS_MAP={"Food & Dining":"🍴","Transport":"🚗","Entertainment":"🎬","Shopping":"🛍","Utilities":"⚡","Health":"💊","Subscriptions":"📱","Other":"📦"};
const SAVE_COLORS=["#6366f1","#10b981","#f59e0b","#f43f5e","#3b82f6","#8b5cf6","#ef4444","#6b7280"];
const SAVE_ICONS=["✈","🛡","📈","🏠","🎓","🚗","💍","🐾","💻","🎯"];
const MONTH_DATA={Jan:{"Food & Dining":520,"Transport":180,"Entertainment":90,"Shopping":210,"Utilities":140,"Health":60,"Subscriptions":80,"Other":150},Feb:{"Food & Dining":480,"Transport":195,"Entertainment":120,"Shopping":280,"Utilities":145,"Health":80,"Subscriptions":80,"Other":130},Mar:{"Food & Dining":610,"Transport":160,"Entertainment":100,"Shopping":190,"Utilities":148,"Health":40,"Subscriptions":80,"Other":110}};

let txns=[
  {id:1,date:"2024-04-01",merchant:"Whole Foods",amount:87.43,category:"Food & Dining",recurring:false},
  {id:2,date:"2024-04-02",merchant:"Uber",amount:14.20,category:"Transport",recurring:false},
  {id:3,date:"2024-04-03",merchant:"Netflix",amount:15.99,category:"Subscriptions",recurring:true},
  {id:4,date:"2024-04-04",merchant:"CVS Pharmacy",amount:32.10,category:"Health",recurring:false},
  {id:5,date:"2024-04-05",merchant:"Chipotle",amount:12.75,category:"Food & Dining",recurring:false},
  {id:6,date:"2024-04-06",merchant:"Amazon",amount:54.99,category:"Shopping",recurring:false},
  {id:7,date:"2024-04-07",merchant:"Electric Bill",amount:92.00,category:"Utilities",recurring:true},
  {id:8,date:"2024-04-08",merchant:"AMC Theaters",amount:28.50,category:"Entertainment",recurring:false},
  {id:9,date:"2024-04-09",merchant:"Starbucks",amount:6.85,category:"Food & Dining",recurring:true},
  {id:10,date:"2024-04-10",merchant:"Shell Gas",amount:48.00,category:"Transport",recurring:false},
  {id:11,date:"2024-04-11",merchant:"Spotify",amount:9.99,category:"Subscriptions",recurring:true},
  {id:12,date:"2024-04-12",merchant:"Target",amount:73.21,category:"Shopping",recurring:false},
];
let savings=[
  {id:1,label:"Vacation fund",icon:"✈",target:1000,saved:420,color:"#6366f1",contributions:[{id:1,date:"2024-03-01",amount:200,note:"March deposit"},{id:2,date:"2024-04-01",amount:220,note:"April deposit"}]},
  {id:2,label:"Emergency fund",icon:"🛡",target:5000,saved:2100,color:"#10b981",contributions:[{id:1,date:"2024-02-01",amount:1000,note:"Initial"},{id:2,date:"2024-03-01",amount:600,note:"March"},{id:3,date:"2024-04-01",amount:500,note:"April"}]},
  {id:3,label:"Investing",icon:"📈",target:10000,saved:3750,color:"#f59e0b",contributions:[{id:1,date:"2024-01-01",amount:1500,note:"Q1"},{id:2,date:"2024-04-01",amount:2250,note:"Q2 start"}]},
];
let budgets={"Food & Dining":600,"Transport":200,"Entertainment":150,"Shopping":300,"Utilities":150,"Health":100,"Subscriptions":80,"Other":200};
let chatMsgs=[{role:"assistant",text:"Hi! I'm your AI budget coach 👋 Ask me anything about your spending, savings goals, or financial habits — I'll give you personalized advice based on your actual data."}];
let currentView="dashboard",searchStr="",filterCat="All",_recurring=false,_savIcon="🎯",_savColor="#6366f1",_editSavId=null,_contribSavId=null;

function ct(){const t={};txns.forEach(x=>{t[x.category]=(t[x.category]||0)+x.amount;});return t;}
function totalSpent(){return txns.reduce((s,t)=>s+t.amount,0);}
function totalSaved(){return savings.reduce((s,a)=>s+a.saved,0);}
function recTotal(){return txns.filter(t=>t.recurring).reduce((s,t)=>s+t.amount,0);}
function score(){let sc=100,c=ct();CATS.forEach(k=>{const s=c[k]||0,b=budgets[k];if(s>b)sc-=Math.min(15,(s-b)/b*30);});return Math.max(0,Math.round(sc));}

function renderScore(){
  const sc=score(),r=22,circ=2*Math.PI*r,col=sc>=80?"#10b981":sc>=55?"#f59e0b":"#ef4444",lbl=sc>=80?"On track":sc>=55?"Watch it":"Over budget";
  document.getElementById("score-ring").innerHTML=`<div class="score-wrap">
    <svg width="54" height="54" viewBox="0 0 54 54">
      <circle cx="27" cy="27" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
      <circle cx="27" cy="27" r="${r}" fill="none" stroke="${col}" stroke-width="6" stroke-dasharray="${sc/100*circ} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
      <text x="27" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="white" font-family="system-ui">${sc}</text>
    </svg>
    <div><div class="score-lbl" style="color:white">Score</div><div class="score-sub" style="color:${col}">${lbl}</div></div>
  </div>`;
}

function switchView(v,btn){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('[id^="view-"]').forEach(el=>el.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');
  document.getElementById('scroll-area').scrollTop=0;
  currentView=v;
  const fab=document.getElementById('fab');
  fab.classList.toggle('hidden',v==='dashboard'||v==='coach'||v==='upload');
  renderView(v);
}

function onFab(){if(currentView==='transactions')openAddTxn();else if(currentView==='savings')openAddSav();}
function renderView(v){
  if(v==='dashboard')renderDash();
  else if(v==='transactions')renderTxns();
  else if(v==='savings')renderSavings();
  else if(v==='coach')renderCoach();
  else if(v==='upload')renderUpload();
  renderScore();
}

// ── DASHBOARD ──
function renderDash(){
  const c=ct(),tot=totalSpent(),ts=totalSaved(),rt=recTotal();
  const donutData=CATS.filter(k=>c[k]).map(k=>({category:k,amount:c[k]}));
  const donut=donutSVG(donutData,tot,160);
  const legend=donutData.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[d.category]}"></div>${d.category.split(' ')[0]}</div>`).join('');
  const catBars=CATS.filter(k=>c[k]).map(k=>{
    const pct=(c[k]/budgets[k])*100,over=c[k]>budgets[k];
    return`<div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:11px;color:rgba(255,255,255,.6)">${ICONS_MAP[k]} ${k}</span>
        <span style="font-size:11px;font-weight:500;color:${over?'#f87171':'#6ee7b7'}">$${c[k].toFixed(0)}<span style="color:rgba(255,255,255,.25)"> /$${budgets[k]}</span></span>
      </div>
      <div class="prog-bg"><div class="prog-fill" style="width:${Math.min(100,pct).toFixed(1)}%;background:${over?'#ef4444':COLORS[k]}"></div></div>
    </div>`;
  }).join('');
  const months=[['Jan',Object.values(MONTH_DATA.Jan).reduce((a,b)=>a+b,0)],['Feb',Object.values(MONTH_DATA.Feb).reduce((a,b)=>a+b,0)],['Mar',Object.values(MONTH_DATA.Mar).reduce((a,b)=>a+b,0)],['Apr',tot]];
  const maxM=Math.max(...months.map(m=>m[1]));
  const mBars=months.map(([m,v])=>`<div style="display:grid;grid-template-columns:28px 1fr 52px;gap:8px;align-items:center;margin-bottom:7px">

function donutSVG(data,total,sz=160){
  const cx=sz/2,cy=sz/2,r=sz*0.375,sw=sz*0.125,circ=2*Math.PI*r;
  let off=0,sl='';
  data.forEach(d=>{const pct=total>0?d.amount/total:0;sl+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORS[d.category]}" stroke-width="${sw}" stroke-dasharray="${pct*circ} ${circ}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=pct*circ;});
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${sw}"/>${sl}<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)" font-family="system-ui">total</text><text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="20" font-weight="600" fill="white" font-family="system-ui">$${total.toFixed(0)}</text></svg>`;
}

function sendChip(t){const i=document.getElementById('chat-input');if(i){i.value=t;sendChat();}}
async function sendChat(){
  const i=document.getElementById('chat-input');const q=(i&&i.value||'').trim();if(!q)return;
  chatMsgs.push({role:'user',text:q});if(i)i.value='';renderCoach();
  const cw=document.getElementById('chat-window');
  if(cw){const d=document.createElement('div');d.className='chat-msg assistant';d.id='typing';d.innerHTML=`<div class="bubble assistant"><div style="display:flex;gap:5px;align-items:center">${[0,1,2].map(i=>`<div class="typing-dot" style="animation-delay:${i*.15}s"></div>`).join('')}</div></div>`;cw.appendChild(d);scrollChat();}
  try{
    const ctx=window._ctx||{};
    const sys=`You are a friendly, concise personal finance coach. User's real April 2024 data:
SPENDING: Total $${(ctx.tot||0).toFixed(2)}, categories: ${JSON.stringify(ctx.c||{})}, budgets: ${JSON.stringify(budgets)}, over-budget: ${(ctx.over||[]).join(', ')||'none'}

Be warm, specific, and concise (3-5 sentences max). Use their actual numbers.`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:sys,messages:chatMsgs.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.text}))})});
    const data=await resp.json();
    chatMsgs.push({role:'assistant',text:data.content.map(b=>b.text||'').join('')});
  }catch{chatMsgs.push({role:'assistant',text:'Sorry, I couldn\'t connect. Please try again.'});}
  renderCoach();
}

function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleFile(f);}
async function handleFile(file){
  const dz=document.getElementById('dz-inner');if(dz)dz.innerHTML=`<div style="font-size:36px;margin-bottom:10px">⏳</div><div style="font-size:14px;color:rgba(255,255,255,.6)">Extracting with AI...</div>`;
  try{
    let content;
    if(file.name.endsWith('.csv')){const t=await file.text();content=[{type:'text',text:`Extract transactions. Return ONLY JSON array: date(YYYY-MM-DD),merchant,amount(positive),category(one of:${CATS.join(',')}),recurring(bool). No markdown.\n\n${t}`}];}
    else{const b64=await new Promise((r,rej)=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.onerror=rej;fr.readAsDataURL(file);});content=[{type:file.name.endsWith('.pdf')?'document':'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},{type:'text',text:`Extract all transactions. Return ONLY JSON array: date(YYYY-MM-DD),merchant,amount(positive),category(one of:${CATS.join(',')}),recurring(bool). No markdown.`}];}
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content}]})});
    const data=await resp.json();
    const parsed=JSON.parse(data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
    parsed.forEach((t,i)=>txns.push({...t,id:Date.now()+i}));
    switchView('transactions',document.querySelector('[data-view=transactions]'));
  }catch{alert('Could not parse statement. Try a CSV file.');renderUpload();}
}

function delSav(id){savings=savings.filter(s=>s.id!==id);closeModal();renderView(currentView);}

function openAddContrib(id){
  _contribSavId=id;const s=savings.find(x=>x.id===id);
  showModal(`Add contribution`,`<p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:14px">${s.icon} ${s.label}</p>
    <div class="field"><label>Date</label><input type="date" class="inp" id="cf-date"></div>
    <div class="field"><label>Amount ($)</label><input type="number" step="0.01" class="inp" id="cf-amount" placeholder="0.00"></div>
    <div class="field"><label>Note (optional)</label><input class="inp" id="cf-note" placeholder="e.g. Monthly deposit"></div>
    <div class="btn-row"><button class="btn-green" onclick="saveContrib()">Add contribution</button><button class="btn-cancel" onclick="closeModal()">Cancel</button></div>`);
}
function saveContrib(){
  const date=document.getElementById('cf-date').value,amount=parseFloat(document.getElementById('cf-amount').value),note=document.getElementById('cf-note').value;
  if(!date||!amount)return;
  savings=savings.map(s=>s.id===_contribSavId?{...s,saved:parseFloat((s.saved+amount).toFixed(2)),contributions:[...(s.contributions||[]),{id:Date.now(),date,amount,note}]}:s);
  closeModal();renderView(currentView);
}
function openViewSav(id){
  const s=savings.find(x=>x.id===id),pct=Math.min(100,(s.saved/s.target)*100);
  const contribs=[...(s.contributions||[])].reverse().map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:12px;margin-bottom:6px">
    <div style="flex:1"><div style="font-size:13px;font-weight:500">$${c.amount.toFixed(2)}</div><div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:1px">${c.date}${c.note?' · '+c.note:''}</div></div>
    <button class="icon-btn del-btn" onclick="delContrib(${id},${c.id})">✕</button>
  </div>`).join('');
  showModal(`${s.icon} ${s.label}`,`
    <div style="background:${s.color}18;border-radius:14px;padding:14px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:rgba(255,255,255,.4)">Saved</span><span style="font-size:12px;color:rgba(255,255,255,.4)">Goal</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:22px;font-weight:700">$${s.saved.toLocaleString()}</span><span style="font-size:22px;font-weight:700;color:rgba(255,255,255,.35)">$${s.target.toLocaleString()}</span></div>
      <div class="prog-bg" style="height:10px"><div class="prog-fill" style="width:${pct.toFixed(0)}%;background:${s.color}"></div></div>
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:5px">${pct.toFixed(1)}% · $${(s.target-s.saved).toLocaleString()} remaining</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:500;color:rgba(255,255,255,.5)">History (${(s.contributions||[]).length})</div>
      <button style="padding:6px 14px;border-radius:8px;border:0.5px solid ${s.color}55;background:${s.color}22;color:${s.color};font-size:12px;cursor:pointer" onclick="closeModal();openAddContrib(${id})">+ Add</button>
    </div>
    <div>${contribs||`<div style="text-align:center;color:rgba(255,255,255,.2);font-size:13px;padding:20px">No contributions yet</div>`}</div>`);
}
function delContrib(sid,cid){
  savings=savings.map(s=>{if(s.id!==sid)return s;const c=s.contributions.find(x=>x.id===cid);return{...s,saved:parseFloat((s.saved-(c?.amount||0)).toFixed(2)),contributions:s.contributions.filter(x=>x.id!==cid)};});
  closeModal();renderView(currentView);
}

// BUDGETS
function openEditBudgets(){
  const fields=CATS.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px">
    <div style="font-size:13px;color:rgba(255,255,255,.7);min-width:120px">${ICONS_MAP[c]} ${c}</div>
    <input type="number" class="inp" id="b-${c.replace(/ /g,'_')}" value="${budgets[c]}" style="width:100px;text-align:right">
  </div>`).join('');
  showModal('Monthly budgets',`${fields}<div class="btn-row" style="margin-top:4px"><button class="btn-primary" onclick="saveBudgets()">Save</button><button class="btn-cancel" onclick="closeModal()">Cancel</button></div>`);
}
function saveBudgets(){CATS.forEach(c=>{const v=parseFloat(document.getElementById('b-'+c.replace(/ /g,'_')).value);if(!isNaN(v))budgets[c]=v;});closeModal();renderView(currentView);renderScore();}

// EXPORT
function exportPDF(){
  const c=ct(),tot=totalSpent(),ts=totalSaved();
  const cRows=Object.entries(c).map(([k,v])=>`<tr><td>${ICONS_MAP[k]} ${k}</td><td align="right">$${v.toFixed(2)}</td><td align="right">$${budgets[k]}</td><td align="right" style="color:${v>budgets[k]?'#dc2626':'#16a34a'}">${v>budgets[k]?'Over':'OK'}</td></tr>`).join('');
  const tRows=txns.map(t=>`<tr><td>${t.date}</td><td>${t.merchant}</td><td>${t.category}</td><td align="right">$${t.amount.toFixed(2)}</td></tr>`).join('');
  const sRows=savings.map(s=>`<tr><td>${s.icon} ${s.label}</td><td align="right">$${s.saved.toLocaleString()}</td><td align="right">$${s.target.toLocaleString()}</td><td align="right">${(s.saved/s.target*100).toFixed(0)}%</td></tr>`).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Budget Report</title><style>body{font-family:system-ui,sans-serif;color:#111;max-width:800px;margin:40px auto;padding:0 20px}h1{font-size:22px;font-weight:700}h2{font-size:15px;font-weight:600;margin:24px 0 8px;color:#4338ca}table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}th{text-align:left;font-size:11px;color:#555;border-bottom:2px solid #e5e7eb;padding:5px 8px}td{padding:6px 8px;border-bottom:1px solid #f3f4f6}.s{display:inline-block;margin-right:28px;margin-bottom:16px}.sv{font-size:26px;font-weight:700;color:#4338ca}.sl{font-size:11px;color:#888}</style></head><body>
    <h1>Budget Report · April 2024</h1><p style="color:#555;font-size:13px;margin-bottom:20px">Generated ${new Date().toLocaleDateString()}</p>
    <div><div class="s"><div class="sv">$${tot.toFixed(2)}</div><div class="sl">Total spent</div></div><div class="s"><div class="sv">${txns.length}</div><div class="sl">Transactions</div></div><div class="s"><div class="sv">$${ts.toLocaleString()}</div><div class="sl">Total saved</div></div></div>
    <h2>Spending by category</h2><table><thead><tr><th>Category</th><th align="right">Spent</th><th align="right">Budget</th><th align="right">Status</th></tr></thead><tbody>${cRows}</tbody></table>
    <h2>All transactions</h2><table><thead><tr><th>Date</th><th>Merchant</th><th>Category</th><th align="right">Amount</th></tr></thead><tbody>${tRows}</tbody></table>
    <h2>Savings accounts</h2><table><thead><tr><th>Account</th><th align="right">Saved</th><th align="right">Goal</th><th align="right">Progress</th></tr></thead><tbody>${sRows}</tbody></table>
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
}

// INIT
renderScore();
renderDash();
</script>
</body>
</html>
